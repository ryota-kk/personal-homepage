<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery 3D Debug Console</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }
    .console {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #4CAF50;
      margin-bottom: 20px;
    }
    .status {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #444;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #333;
    }
    .status-row:last-child {
      border-bottom: none;
    }
    .label {
      color: #888;
    }
    .value {
      color: #4CAF50;
      font-weight: bold;
    }
    .error {
      color: #f44336;
    }
    .success {
      color: #4CAF50;
    }
    .photo-list {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #444;
      max-height: 400px;
      overflow-y: auto;
    }
    .photo-item {
      padding: 8px;
      margin: 5px 0;
      background: #1a1a1a;
      border-radius: 4px;
      border-left: 3px solid #4CAF50;
    }
    .btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
      font-size: 14px;
    }
    .btn:hover {
      background: #45a049;
    }
    .btn-open {
      background: #2196F3;
    }
    .btn-open:hover {
      background: #0b7dda;
    }
  </style>
</head>
<body>
  <div class="console">
    <h1>Gallery 3D Photo Stream - Debug Console</h1>

    <div class="status">
      <div class="status-row">
        <span class="label">Gallery 3D Script:</span>
        <span class="value" id="scriptStatus">检查中...</span>
      </div>
      <div class="status-row">
        <span class="label">Photo Count:</span>
        <span class="value" id="photoCount">0</span>
      </div>
      <div class="status-row">
        <span class="label">Direction Distribution:</span>
        <span class="value" id="directionDist">-</span>
      </div>
      <div class="status-row">
        <span class="label">Z-axis Range:</span>
        <span class="value" id="zRange">-</span>
      </div>
      <div class="status-row">
        <span class="label">Constants:</span>
        <span class="value" id="constants">-</span>
      </div>
    </div>

    <div class="photo-list">
      <h3>Photo Data:</h3>
      <div id="photoData">Loading...</div>
    </div>

    <div>
      <button class="btn btn-open" onclick="openTestPage()">打开测试页面</button>
      <button class="btn" onclick="openMainPage()">打开主页面</button>
      <button class="btn" onclick="location.reload()">刷新检查</button>
    </div>
  </div>

  <script>
    async function checkGallerySystem() {
      try {
        // Fetch gallery-3d.js
        const response = await fetch('/gallery-3d.js');
        const code = await response.text();

        document.getElementById('scriptStatus').textContent = '✓ 已加载';
        document.getElementById('scriptStatus').className = 'value success';

        // Parse photo data
        const photoMatches = code.match(/{ id: \d+,.*?}/g);
        if (photoMatches) {
          const photoCount = photoMatches.length;
          document.getElementById('photoCount').textContent = photoCount + ' 张';

          // Count directions
          const forwardCount = (code.match(/direction: 1/g) || []).length;
          const backwardCount = (code.match(/direction: -1/g) || []).length;
          const forwardPct = ((forwardCount / photoCount) * 100).toFixed(1);
          const backwardPct = ((backwardCount / photoCount) * 100).toFixed(1);

          document.getElementById('directionDist').textContent =
            `Forward: ${forwardCount} (${forwardPct}%), Backward: ${backwardCount} (${backwardPct}%)`;

          // Parse constants
          const zMin = code.match(/Z_MIN = (-?\d+)/)?.[1];
          const zMax = code.match(/Z_MAX = (-?\d+)/)?.[1];
          const flowSpeed = code.match(/FLOW_SPEED = ([\d.]+)/)?.[1];
          const scrollDelta = code.match(/SCROLL_DELTA = (\d+)/)?.[1];

          document.getElementById('zRange').textContent = `${zMin}px to ${zMax}px`;
          document.getElementById('constants').textContent =
            `Speed: ${flowSpeed}px/frame, Scroll: ±${scrollDelta}px`;

          // Display photos
          const photoDataDiv = document.getElementById('photoData');
          photoDataDiv.innerHTML = '';

          photoMatches.forEach((match, index) => {
            const idMatch = match.match(/id: (\d+)/);
            const titleMatch = match.match(/title: '([^']+)'/);
            const dirMatch = match.match(/direction: (-?\d)/);
            const zMatch = match.match(/initialZ: (-?\d+)/);

            const item = document.createElement('div');
            item.className = 'photo-item';
            item.innerHTML = `
              <strong>Photo ${idMatch[1]}</strong>: ${titleMatch[1]}<br>
              <small>Initial Z: ${zMatch[1]}px, Direction: ${dirMatch[1] === '1' ? 'Forward ➡' : 'Backward ⬅'}</small>
            `;
            photoDataDiv.appendChild(item);
          });
        }

      } catch (error) {
        document.getElementById('scriptStatus').textContent = '✗ 加载失败';
        document.getElementById('scriptStatus').className = 'value error';
        console.error('Error:', error);
      }
    }

    function openTestPage() {
      window.open('/test-gallery-3d.html', '_blank');
    }

    function openMainPage() {
      window.open('/index.html', '_blank');
    }

    // Auto-check on load
    checkGallerySystem();
  </script>
</body>
</html>
