<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成占位照片</title>
</head>
<body>
  <h1>生成 280×200 占位照片</h1>
  <p>点击下面的按钮生成照片并下载</p>
  <div id="photos"></div>

  <script>
    const photos = [
      { id: 1, title: '废墟中的生机', color: '#2d5a4a' },
      { id: 2, title: '霓虹幻影', color: '#d946ef' },
      { id: 3, title: '钢铁森林', color: '#64748b' },
      { id: 4, title: '遗忘之地', color: '#3b82f6' },
      { id: 5, title: '旧日回声', color: '#f59e0b' },
      { id: 6, title: '暮色余晖', color: '#dc2626' },
      { id: 7, title: '静默守望', color: '#6366f1' },
      { id: 8, title: '碎片时光', color: '#8b5cf6' },
      { id: 9, title: '风沙过境', color: '#eab308' },
      { id: 10, title: '最后的信号', color: '#ef4444' },
      { id: 11, title: '荒原之路', color: '#06b6d4' },
      { id: 12, title: '重生之芽', color: '#22c55e' }
    ];

    const container = document.getElementById('photos');

    photos.forEach(photo => {
      const canvas = document.createElement('canvas');
      canvas.width = 280;
      canvas.height = 200;
      const ctx = canvas.getContext('2d');

      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, 280, 200);
      gradient.addColorStop(0, photo.color);
      gradient.addColorStop(1, '#000');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 280, 200);

      // 标题文字
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(photo.title, 140, 100);

      // ID
      ctx.font = '14px sans-serif';
      ctx.fillText(`Photo ${photo.id}`, 140, 130);

      // 显示预览
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:inline-block;margin:10px;text-align:center;';

      const img = document.createElement('img');
      img.src = canvas.toDataURL('image/jpeg', 0.9);
      img.style.cssText = 'display:block;border:2px solid #333;';

      const btn = document.createElement('button');
      btn.textContent = `下载 photo${photo.id}.jpg`;
      btn.style.cssText = 'margin-top:5px;padding:5px 10px;';
      btn.onclick = () => {
        const link = document.createElement('a');
        link.download = `photo${photo.id}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
      };

      wrapper.appendChild(img);
      wrapper.appendChild(btn);
      container.appendChild(wrapper);
    });

    // 全部下载按钮
    const downloadAll = document.createElement('button');
    downloadAll.textContent = '下载全部 12 张照片';
    downloadAll.style.cssText = 'margin:20px;padding:10px 20px;font-size:16px;';
    downloadAll.onclick = () => {
      photos.forEach((photo, index) => {
        setTimeout(() => {
          const canvas = document.createElement('canvas');
          canvas.width = 280;
          canvas.height = 200;
          const ctx = canvas.getContext('2d');

          const gradient = ctx.createLinearGradient(0, 0, 280, 200);
          gradient.addColorStop(0, photo.color);
          gradient.addColorStop(1, '#000');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, 280, 200);

          ctx.fillStyle = '#fff';
          ctx.font = 'bold 20px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(photo.title, 140, 100);
          ctx.font = '14px sans-serif';
          ctx.fillText(`Photo ${photo.id}`, 140, 130);

          const link = document.createElement('a');
          link.download = `photo${photo.id}.jpg`;
          link.href = canvas.toDataURL('image/jpeg', 0.9);
          link.click();
        }, index * 300);
      });
    };
    document.body.insertBefore(downloadAll, container);
  </script>
</body>
</html>
